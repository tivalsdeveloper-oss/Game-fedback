<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Viewport meta tag (Required for mobile responsiveness on standalone pages) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta charset="UTF-8">
    <title>Feedback & Help</title>

    <style>
        /* Wrapper to prevent the form from touching the screen edges on mobile */
        .tivals-form-wrapper {
            width: 100%;
            padding: 15px; 
            box-sizing: border-box;
            display: flex;
            justify-content: center; /* Centers the form on the page */
        }

        /* The actual form container */
        .tivals-form-container {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffffff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            width: 100%; /* Allows it to shrink on small screens */
            max-width: 500px; /* Stops it from stretching too wide on PCs */
            box-sizing: border-box;
            color: #333;
        }

        .tivals-form-container h3 {
            color: #2563eb;
            margin-top: 0;
            margin-bottom: 20px;
            text-align: center;
            font-size: 24px;
        }

        .tivals-form-group {
            margin-bottom: 18px;
        }

        .tivals-form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            font-size: 14px;
            color: #4b5563;
        }

        .tivals-form-group input, 
        .tivals-form-group select, 
        .tivals-form-group textarea {
            width: 100%; /* Ensures inputs fill the container properly */
            padding: 12px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            box-sizing: border-box; /* Keeps padding inside the width limits */
            font-family: inherit;
            font-size: 15px;
            transition: border-color 0.3s;
        }

        .tivals-form-group input:focus, 
        .tivals-form-group select:focus, 
        .tivals-form-group textarea:focus {
            border-color: #2563eb;
            outline: none;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); /* Nice glow effect on click */
        }

        .tivals-form-group textarea {
            min-height: 120px;
            resize: vertical; /* Allows user to drag the height, but not the width */
        }

        .tivals-submit-btn {
            width: 100%;
            padding: 14px;
            background-color: #2563eb;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s;
        }

        .tivals-submit-btn:hover {
            background-color: #1d4ed8;
        }

        .tivals-submit-btn:active {
            transform: scale(0.98); /* Slight click animation */
        }

        /* MOBILE RESPONSIVENESS: Adjusts design for screens smaller than 480px (Phones) */
        @media (max-width: 480px) {
            .tivals-form-container {
                padding: 20px 15px; /* Reduces inner padding to save screen space */
            }
            
            .tivals-form-container h3 {
                font-size: 20px; /* Slightly smaller title */
            }

            .tivals-form-group input, 
            .tivals-form-group select, 
            .tivals-form-group textarea {
                padding: 10px; /* Slightly smaller inputs */
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

    <div class="tivals-form-wrapper">
        <div class="tivals-form-container">
            <h3>Feedback & Help</h3>
            
            <!-- Sends data directly to your email -->
            <form action="https://formsubmit.co/tivalsdeveloper@gmail.com" method="POST">
                
                <!-- Email subject line -->
                <input type="hidden" name="_subject" value="New Support Request for TivalsDeveloper!">
                
                <!-- Send users to a generic thank you page (optional, remove to use default) -->
                <!-- <input type="hidden" name="_next" value="https://yourwebsite.com/thanks.html"> -->

                <div class="tivals-form-group">
                    <label for="name">Your Name</label>
                    <input type="text" id="name" name="name" required placeholder="Enter your name">
                </div>

                <div class="tivals-form-group">
                    <label for="email">Your Email Address</label>
                    <!-- Type="email" automatically brings up the right keyboard on mobile -->
                    <input type="email" id="email" name="email" required placeholder="Enter your email">
                </div>

                <div class="tivals-form-group">
                    <label for="topic">How can we help?</label>
                    <select id="topic" name="topic" required>
                        <option value="" disabled selected>Select a topic...</option>
                        <option value="Need Help">I need help</option>
                        <option value="Bug Report">I found a bug</option>
                        <option value="Feature Request">Feature Request</option>
                        <option value="Feedback">I have feedback</option>
                    </select>
                </div>

                <div class="tivals-form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" required placeholder="Please describe your issue or feedback in detail..."></textarea>
                </div>

                <button type="submit" class="tivals-submit-btn">Send Message</button>
            </form>
        </div>
    </div>
</body>
</html>
