<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Support Chatbot | Tivals Feedback</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #f1f5f9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
            padding: 16px;
        }
        .chatbot-wrapper { width: 100%; display: flex; justify-content: center; }
        .chatbot-card {
            max-width: 550px;
            width: 100%;
            background: #fff;
            border-radius: 28px;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.15);
            overflow: hidden;
        }
        .chat-header {
            background: #2563eb;
            padding: 18px 24px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .chat-header h3 {
            font-size: 1.4rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .chat-header h3:before { content: "💬"; font-size: 1.4rem; }
        .reset-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .reset-btn:hover { background: rgba(255,255,255,0.35); transform: scale(0.97); }
        .chat-messages {
            background: #fefefe;
            padding: 20px 18px;
            height: 440px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 14px;
            scroll-behavior: smooth;
        }
        .message { display: flex; flex-direction: column; max-width: 85%; animation: fadeSlideUp 0.25s ease; }
        .message.bot { align-items: flex-start; }
        .message.user { align-items: flex-end; margin-left: auto; }
        .bubble {
            padding: 12px 16px;
            border-radius: 22px;
            font-size: 0.95rem;
            line-height: 1.4;
            word-break: break-word;
            box-shadow: 0 1px 1px rgba(0,0,0,0.05);
        }
        .bot .bubble { background: #eef2ff; color: #1e293b; border-bottom-left-radius: 5px; }
        .user .bubble { background: #2563eb; color: white; border-bottom-right-radius: 5px; }
        .quick-replies { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 12px; }
        .quick-btn {
            background: white;
            border: 1.5px solid #2563eb;
            color: #2563eb;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .quick-btn:hover { background: #2563eb; color: white; }
        .action-buttons { display: flex; gap: 14px; margin-top: 12px; flex-wrap: wrap; }
        .action-btn {
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: 0.2s;
        }
        .action-btn.primary { background: #2563eb; color: white; }
        .action-btn.primary:hover { background: #1d4ed8; transform: scale(0.97); }
        .action-btn.secondary { background: #f1f5f9; color: #334155; border: 1px solid #cbd5e1; }
        .action-btn.secondary:hover { background: #e2e8f0; }
        .typing-indicator { display: flex; gap: 5px; padding: 8px 14px; background: #eef2ff; width: fit-content; border-radius: 24px; }
        .typing-indicator span { width: 8px; height: 8px; background: #4b5563; border-radius: 50%; animation: blink 1.4s infinite both; }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink { 0%,80%,100%{opacity:0.3;} 40%{opacity:1;} }
        .chat-input-area {
            background: white;
            border-top: 1px solid #e2e8f0;
            padding: 14px 18px;
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .chat-input-area input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #cbd5e1;
            border-radius: 44px;
            font-size: 0.95rem;
            outline: none;
        }
        .chat-input-area input:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.2); }
        .send-btn {
            background: #2563eb;
            border: none;
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.2rem;
        }
        .send-btn:hover { background: #1d4ed8; transform: scale(0.96); }
        @media (max-width: 500px) {
            .chat-messages { height: 420px; padding: 16px 14px; }
            .bubble { font-size: 0.9rem; padding: 10px 14px; }
            .quick-btn { padding: 6px 14px; font-size: 0.8rem; }
        }
        @keyframes fadeSlideUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .chat-messages::-webkit-scrollbar { width: 5px; }
        .chat-messages::-webkit-scrollbar-track { background: #eef2ff; border-radius: 10px; }
        .chat-messages::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 10px; }
    </style>
</head>
<body>
<div class="chatbot-wrapper">
    <div class="chatbot-card">
        <div class="chat-header">
            <h3>Support Assistant</h3>
            <button class="reset-btn" id="resetChatBtn">⟳ Restart</button>
        </div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-area">
            <input type="text" id="userInput" placeholder="Type your answer..." autocomplete="off">
            <button class="send-btn" id="sendBtn">➤</button>
        </div>
    </div>
</div>

<!-- Hidden iframe and form for reliable submission -->
<iframe id="hiddenFormFrame" name="hiddenFormFrame" style="display:none;"></iframe>

<script>
    // -------------------- STATE --------------------
    let currentStep = 'init';      // init, name, email, topic, message, confirm
    let userData = { name: '', email: '', topic: '', message: '' };
    
    // DOM elements
    const messagesContainer = document.getElementById('chatMessages');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const resetBtn = document.getElementById('resetChatBtn');
    const hiddenFrame = document.getElementById('hiddenFormFrame');
    
    function scrollToBottom() {
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }
    
    function addMessage(sender, text, isHtml = false) {
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${sender}`;
        const bubbleDiv = document.createElement('div');
        bubbleDiv.className = 'bubble';
        if (isHtml) bubbleDiv.innerHTML = text;
        else bubbleDiv.innerText = text;
        messageDiv.appendChild(bubbleDiv);
        messagesContainer.appendChild(messageDiv);
        scrollToBottom();
    }
    
    function removeTempInteractiveElements() {
        document.querySelectorAll('.temp-interactive').forEach(el => el.remove());
    }
    
    function addQuickReplyButtons(options, onSelectCallback) {
        removeTempInteractiveElements();
        const wrapperDiv = document.createElement('div');
        wrapperDiv.className = `message bot temp-interactive`;
        const bubbleDiv = document.createElement('div');
        bubbleDiv.className = 'bubble';
        const buttonsContainer = document.createElement('div');
        buttonsContainer.className = 'quick-replies';
        options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'quick-btn';
            btn.innerText = opt.label;
            btn.addEventListener('click', () => {
                document.querySelectorAll('.quick-btn').forEach(b => b.disabled = true);
                onSelectCallback(opt.value);
                wrapperDiv.remove();
            });
            buttonsContainer.appendChild(btn);
        });
        bubbleDiv.appendChild(buttonsContainer);
        wrapperDiv.appendChild(bubbleDiv);
        messagesContainer.appendChild(wrapperDiv);
        scrollToBottom();
    }
    
    function addConfirmActions(onSend, onEdit) {
        removeTempInteractiveElements();
        const actionWrapper = document.createElement('div');
        actionWrapper.className = `message bot temp-interactive`;
        const bubbleDiv = document.createElement('div');
        bubbleDiv.className = 'bubble';
        const actionsDiv = document.createElement('div');
        actionsDiv.className = 'action-buttons';
        
        const sendAction = document.createElement('button');
        sendAction.innerText = '✅ Send Feedback';
        sendAction.className = 'action-btn primary';
        sendAction.addEventListener('click', () => {
            sendAction.disabled = true;
            editAction.disabled = true;
            onSend();
        });
        
        const editAction = document.createElement('button');
        editAction.innerText = '✏️ Edit / Start over';
        editAction.className = 'action-btn secondary';
        editAction.addEventListener('click', () => {
            onEdit();
        });
        
        actionsDiv.appendChild(sendAction);
        actionsDiv.appendChild(editAction);
        bubbleDiv.appendChild(actionsDiv);
        actionWrapper.appendChild(bubbleDiv);
        messagesContainer.appendChild(actionWrapper);
        scrollToBottom();
    }
    
    async function showTyping(duration = 1000) {
        const typingDiv = document.createElement('div');
        typingDiv.className = 'message bot temp-interactive';
        typingDiv.id = 'typingIndicator';
        const bubble = document.createElement('div');
        bubble.className = 'bubble typing-indicator';
        bubble.innerHTML = '<span></span><span></span><span></span>';
        typingDiv.appendChild(bubble);
        messagesContainer.appendChild(typingDiv);
        scrollToBottom();
        await new Promise(r => setTimeout(r, duration));
        document.getElementById('typingIndicator')?.remove();
    }
    
    // ----- RELIABLE FORM SUBMIT USING HIDDEN IFRAME (SAME AS ORIGINAL FORM) -----
    function submitFeedback() {
        addMessage('bot', '⏳ Sending your message, one moment...');
        
        // Create a temporary form that mimics the original working form
        const tempForm = document.createElement('form');
        tempForm.method = 'POST';
        tempForm.action = 'https://formsubmit.co/tivalsdeveloper@gmail.com';
        tempForm.target = 'hiddenFormFrame';
        tempForm.style.display = 'none';
        
        // Add all fields exactly as the original form would have
        const fields = [
            { name: 'name', value: userData.name },
            { name: 'email', value: userData.email },
            { name: 'topic', value: userData.topic },
            { name: 'message', value: userData.message },
            { name: '_subject', value: `[Chatbot] Support Request from ${userData.name}` },
            { name: '_captcha', value: 'false' }          // Disable captcha for smooth delivery
        ];
        
        fields.forEach(field => {
            const input = document.createElement('input');
            input.type = 'hidden';
            input.name = field.name;
            input.value = field.value;
            tempForm.appendChild(input);
        });
        
        document.body.appendChild(tempForm);
        
        // Listen for iframe load – this indicates the submission was processed
        const onFrameLoad = () => {
            hiddenFrame.removeEventListener('load', onFrameLoad);
            // Remove the form after submission
            if (tempForm.parentNode) tempForm.parentNode.removeChild(tempForm);
            
            // Show success message
            addMessage('bot', '✅ **Message sent!** 🎉 Thank you for reaching out. Our team will get back to you shortly.', true);
            addMessage('bot', '💡 *Note:* If you don’t see an email in your inbox, please check your spam folder. Also ensure that the recipient email (tivalsdeveloper@gmail.com) is verified with FormSubmit – they send a confirmation link when you first use it.', true);
            currentStep = 'finished';
            userInput.placeholder = "Chat completed — press Restart to begin";
            removeTempInteractiveElements();
        };
        
        hiddenFrame.addEventListener('load', onFrameLoad);
        
        // Submit the form (this works exactly like a normal form submission)
        tempForm.submit();
        
        // Fallback timeout in case iframe never loads (rare)
        setTimeout(() => {
            if (currentStep !== 'finished') {
                hiddenFrame.removeEventListener('load', onFrameLoad);
                if (tempForm.parentNode) tempForm.parentNode.removeChild(tempForm);
                addMessage('bot', '⚠️ Submission took longer than expected. Please check your email in a few minutes. If nothing arrives, verify the recipient address at FormSubmit.', true);
                currentStep = 'finished';
                userInput.placeholder = "Chat completed — press Restart";
                removeTempInteractiveElements();
            }
        }, 8000);
    }
    
    // ----- RESET FUNCTION -----
    function fullReset() {
        currentStep = 'init';
        userData = { name: '', email: '', topic: '', message: '' };
        messagesContainer.innerHTML = '';
        removeTempInteractiveElements();
        userInput.disabled = false;
        userInput.placeholder = "Type your answer...";
        userInput.value = '';
        startConversation();
    }
    
    // ----- CONVERSATION FLOW -----
    async function startConversation() {
        addMessage('bot', '👋 Hey there! I\'m your support assistant. I\'ll help you send feedback or request help — just like the contact form. Let\'s get started!');
        await showTyping(500);
        askName();
    }
    
    function askName() {
        currentStep = 'name';
        addMessage('bot', 'What\'s your name?');
    }
    
    function askEmail() {
        currentStep = 'email';
        addMessage('bot', 'Great! What\'s your email address? (So we can reply)');
    }
    
    function askTopic() {
        currentStep = 'topic';
        addMessage('bot', 'How can we help you? Select a topic:');
        addQuickReplyButtons([
            { label: '🆘 Need Help', value: 'Need Help' },
            { label: '🐞 Bug Report', value: 'Bug Report' },
            { label: '✨ Feature Request', value: 'Feature Request' },
            { label: '💬 General Feedback', value: 'Feedback' }
        ], (selectedTopic) => {
            userData.topic = selectedTopic;
            addMessage('user', selectedTopic);
            askMessage();
        });
    }
    
    function askMessage() {
        currentStep = 'message';
        addMessage('bot', 'Please describe your issue or feedback in detail. Tell us anything we should know:');
    }
    
    function showConfirmation() {
        currentStep = 'confirm';
        const summary = `
            <strong>📋 Please review:</strong><br>
            • Name: ${escapeHtml(userData.name)}<br>
            • Email: ${escapeHtml(userData.email)}<br>
            • Topic: ${escapeHtml(userData.topic)}<br>
            • Message: ${escapeHtml(userData.message.substring(0, 180))}${userData.message.length > 180 ? '…' : ''}<br>
            <em>Ready to send?</em>
        `;
        addMessage('bot', summary, true);
        addConfirmActions(() => submitFeedback(), () => {
            addMessage('bot', '🔄 Restarting from scratch — no worries, let\'s do it fresh!');
            fullReset();
        });
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    async function processUserText(rawText) {
        const text = rawText.trim();
        if (text === "") {
            addMessage('bot', 'Please write something — I’m here to help 😊');
            return;
        }
        if (currentStep === 'finished') {
            addMessage('bot', '🔄 This conversation is completed. Press "Restart" to send another request.');
            userInput.value = '';
            return;
        }
        
        addMessage('user', text);
        userInput.value = '';
        removeTempInteractiveElements();
        
        switch (currentStep) {
            case 'name':
                if (text.length < 2) addMessage('bot', 'Please enter a valid name (at least 2 characters).');
                else { userData.name = text; askEmail(); }
                break;
            case 'email':
                const emailRegex = /^[^\s@]+@([^\s@]+\.)+[^\s@]+$/;
                if (!emailRegex.test(text)) addMessage('bot', 'Please enter a valid email (e.g., name@example.com).');
                else { userData.email = text; askTopic(); }
                break;
            case 'topic':
                const lower = text.toLowerCase();
                let mapped = null;
                if (lower.includes('help') || lower.includes('support')) mapped = 'Need Help';
                else if (lower.includes('bug') || lower.includes('error')) mapped = 'Bug Report';
                else if (lower.includes('feature') || lower.includes('request')) mapped = 'Feature Request';
                else if (lower.includes('feedback') || lower.includes('comment')) mapped = 'Feedback';
                if (mapped) {
                    userData.topic = mapped;
                    addMessage('bot', `Selected topic: ${mapped}`);
                    askMessage();
                } else {
                    addMessage('bot', 'Please select a topic using the buttons, or type one of: Help, Bug Report, Feature Request, Feedback.');
                    askTopic(); // show buttons again
                }
                break;
            case 'message':
                if (text.length < 5) addMessage('bot', 'Please provide at least 5 characters.');
                else {
                    userData.message = text;
                    await showTyping(500);
                    showConfirmation();
                }
                break;
            default:
                if (currentStep === 'confirm') addMessage('bot', 'Please use the "Send Feedback" or "Edit / Start over" buttons.');
                else addMessage('bot', 'I’m not sure what happened. Press "Restart" to start over.');
                break;
        }
    }
    
    // Event handlers
    function handleSend() {
        const raw = userInput.value;
        if (raw.trim() === "") return;
        processUserText(raw);
    }
    
    sendBtn.addEventListener('click', handleSend);
    userInput.addEventListener('keypress', e => { if (e.key === 'Enter') { e.preventDefault(); handleSend(); } });
    resetBtn.addEventListener('click', () => fullReset());
    
    // Start the chat
    startConversation();
    userInput.focus();
</script>
</body>
</html>
