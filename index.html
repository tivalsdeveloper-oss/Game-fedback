<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Support Chatbot | Tivals Feedback</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f1f5f9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
            padding: 16px;
        }

        .chatbot-wrapper {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .chatbot-card {
            max-width: 550px;
            width: 100%;
            background-color: #ffffff;
            border-radius: 28px;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.15), 0 1px 3px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            transition: all 0.2s ease;
        }

        .chat-header {
            background: #2563eb;
            padding: 18px 24px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .chat-header h3 {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: -0.2px;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .chat-header h3:before {
            content: "💬";
            font-size: 1.4rem;
        }

        .reset-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            backdrop-filter: blur(2px);
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .reset-btn:hover {
            background: rgba(255,255,255,0.35);
            transform: scale(0.97);
        }

        .chat-messages {
            background: #fefefe;
            padding: 20px 18px;
            height: 440px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 14px;
            scroll-behavior: smooth;
        }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 85%;
            animation: fadeSlideUp 0.25s ease;
        }

        .message.bot {
            align-items: flex-start;
        }

        .message.user {
            align-items: flex-end;
            margin-left: auto;
        }

        .bubble {
            padding: 12px 16px;
            border-radius: 22px;
            font-size: 0.95rem;
            line-height: 1.4;
            word-break: break-word;
            box-shadow: 0 1px 1px rgba(0,0,0,0.05);
        }

        .bot .bubble {
            background: #eef2ff;
            color: #1e293b;
            border-bottom-left-radius: 5px;
            border-top-left-radius: 18px;
        }

        .user .bubble {
            background: #2563eb;
            color: white;
            border-bottom-right-radius: 5px;
            border-top-right-radius: 18px;
        }

        .quick-replies {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 12px;
        }

        .quick-btn {
            background: white;
            border: 1.5px solid #2563eb;
            color: #2563eb;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
        }

        .quick-btn:hover {
            background: #2563eb;
            color: white;
            transform: translateY(-1px);
        }

        .action-buttons {
            display: flex;
            gap: 14px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .action-btn {
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            font-family: inherit;
            transition: 0.2s;
        }

        .action-btn.primary {
            background: #2563eb;
            color: white;
            box-shadow: 0 2px 5px rgba(37,99,235,0.3);
        }

        .action-btn.primary:hover {
            background: #1d4ed8;
            transform: scale(0.97);
        }

        .action-btn.secondary {
            background: #f1f5f9;
            color: #334155;
            border: 1px solid #cbd5e1;
        }

        .action-btn.secondary:hover {
            background: #e2e8f0;
        }

        .typing-indicator {
            display: flex;
            gap: 5px;
            padding: 8px 14px;
            background: #eef2ff;
            width: fit-content;
            border-radius: 24px;
            align-items: center;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #4b5563;
            border-radius: 50%;
            animation: blink 1.4s infinite both;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes blink {
            0%, 80%, 100% { opacity: 0.3; transform: scale(0.8);}
            40% { opacity: 1; transform: scale(1);}
        }

        .chat-input-area {
            background: white;
            border-top: 1px solid #e2e8f0;
            padding: 14px 18px;
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .chat-input-area input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #cbd5e1;
            border-radius: 44px;
            font-size: 0.95rem;
            font-family: inherit;
            outline: none;
            transition: 0.2s;
            background: #fafcff;
        }

        .chat-input-area input:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37,99,235,0.2);
        }

        .send-btn {
            background: #2563eb;
            border: none;
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
            font-size: 1.2rem;
        }

        .send-btn:hover {
            background: #1d4ed8;
            transform: scale(0.96);
        }

        @media (max-width: 500px) {
            .chatbot-card {
                border-radius: 20px;
            }
            .chat-messages {
                height: 420px;
                padding: 16px 14px;
            }
            .bubble {
                font-size: 0.9rem;
                padding: 10px 14px;
            }
            .quick-btn {
                padding: 6px 14px;
                font-size: 0.8rem;
            }
        }

        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .chat-messages::-webkit-scrollbar {
            width: 5px;
        }
        .chat-messages::-webkit-scrollbar-track {
            background: #eef2ff;
            border-radius: 10px;
        }
        .chat-messages::-webkit-scrollbar-thumb {
            background: #94a3b8;
            border-radius: 10px;
        }
    </style>
</head>
<body>
<div class="chatbot-wrapper">
    <div class="chatbot-card">
        <div class="chat-header">
            <h3>Support Assistant</h3>
            <button class="reset-btn" id="resetChatBtn">⟳ Restart</button>
        </div>
        <div class="chat-messages" id="chatMessages">
            <!-- messages appear here -->
        </div>
        <div class="chat-input-area">
            <input type="text" id="userInput" placeholder="Type your answer..." autocomplete="off">
            <button class="send-btn" id="sendBtn">➤</button>
        </div>
    </div>
</div>

<!-- Hidden iframe for reliable form submission (no CORS, no page reload) -->
<iframe id="hiddenFormFrame" name="hiddenFormFrame" style="display:none;"></iframe>

<script>
    // ----------------------------------------------
    //  CHATBOT STATE & DATA
    // ----------------------------------------------
    let currentStep = 'init';      // init, name, email, topic, message, confirm
    let userData = {
        name: '',
        email: '',
        topic: '',
        message: ''
    };
    
    // DOM elements
    const messagesContainer = document.getElementById('chatMessages');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const resetBtn = document.getElementById('resetChatBtn');
    const hiddenFrame = document.getElementById('hiddenFormFrame');
    
    // Helper: scroll to bottom
    function scrollToBottom() {
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }
    
    // Helper: add a message bubble (plain text or HTML)
    function addMessage(sender, text, isHtml = false) {
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${sender}`;
        const bubbleDiv = document.createElement('div');
        bubbleDiv.className = 'bubble';
        if (isHtml) {
            bubbleDiv.innerHTML = text;
        } else {
            bubbleDiv.innerText = text;
        }
        messageDiv.appendChild(bubbleDiv);
        messagesContainer.appendChild(messageDiv);
        scrollToBottom();
    }
    
    // Remove temporary interactive elements (quick replies, action buttons, typing)
    function removeTempInteractiveElements() {
        const existingTemp = document.querySelectorAll('.temp-interactive');
        existingTemp.forEach(el => el.remove());
    }
    
    // Add quick reply buttons
    function addQuickReplyButtons(options, onSelectCallback) {
        removeTempInteractiveElements();
        const wrapperDiv = document.createElement('div');
        wrapperDiv.className = `message bot temp-interactive`;
        const bubbleDiv = document.createElement('div');
        bubbleDiv.className = 'bubble';
        bubbleDiv.style.paddingBottom = '8px';
        const buttonsContainer = document.createElement('div');
        buttonsContainer.className = 'quick-replies';
        
        options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'quick-btn';
            btn.innerText = opt.label;
            btn.addEventListener('click', () => {
                // prevent double clicking
                document.querySelectorAll('.quick-btn').forEach(b => b.disabled = true);
                onSelectCallback(opt.value);
                wrapperDiv.remove();  // remove buttons after selection
            });
            buttonsContainer.appendChild(btn);
        });
        
        bubbleDiv.appendChild(buttonsContainer);
        wrapperDiv.appendChild(bubbleDiv);
        messagesContainer.appendChild(wrapperDiv);
        scrollToBottom();
    }
    
    // Add confirm action buttons (Send & Edit)
    function addConfirmActions(onSend, onEdit) {
        removeTempInteractiveElements();
        const actionWrapper = document.createElement('div');
        actionWrapper.className = `message bot temp-interactive`;
        const bubbleDiv = document.createElement('div');
        bubbleDiv.className = 'bubble';
        const actionsDiv = document.createElement('div');
        actionsDiv.className = 'action-buttons';
        
        const sendAction = document.createElement('button');
        sendAction.innerText = '✅ Send Feedback';
        sendAction.className = 'action-btn primary';
        sendAction.addEventListener('click', () => {
            // disable both to prevent multiple submissions
            sendAction.disabled = true;
            editAction.disabled = true;
            onSend();
        });
        
        const editAction = document.createElement('button');
        editAction.innerText = '✏️ Edit / Start over';
        editAction.className = 'action-btn secondary';
        editAction.addEventListener('click', () => {
            onEdit();
        });
        
        actionsDiv.appendChild(sendAction);
        actionsDiv.appendChild(editAction);
        bubbleDiv.appendChild(actionsDiv);
        actionWrapper.appendChild(bubbleDiv);
        messagesContainer.appendChild(actionWrapper);
        scrollToBottom();
    }
    
    // Typing indicator simulation
    async function showTyping(duration = 1000) {
        const typingDiv = document.createElement('div');
        typingDiv.className = 'message bot temp-interactive';
        typingDiv.id = 'typingIndicator';
        const bubble = document.createElement('div');
        bubble.className = 'bubble typing-indicator';
        bubble.innerHTML = '<span></span><span></span><span></span>';
        typingDiv.appendChild(bubble);
        messagesContainer.appendChild(typingDiv);
        scrollToBottom();
        await new Promise(r => setTimeout(r, duration));
        if (document.getElementById('typingIndicator')) {
            document.getElementById('typingIndicator')?.remove();
        }
    }
    
    // ----- ROBUST FORM SUBMIT using hidden iframe (no CORS, reliable) -----
    function submitFeedbackViaIframe() {
        return new Promise((resolve, reject) => {
            const formEndpoint = 'https://formsubmit.co/tivalsdeveloper@gmail.com';
            
            // Create temporary form element
            const tempForm = document.createElement('form');
            tempForm.method = 'POST';
            tempForm.action = formEndpoint;
            tempForm.target = 'hiddenFormFrame';  // hidden iframe
            tempForm.style.display = 'none';
            
            // Add standard fields exactly like original form would send
            const fields = [
                { name: 'name', value: userData.name },
                { name: 'email', value: userData.email },
                { name: 'topic', value: userData.topic },
                { name: 'message', value: userData.message },
                { name: '_subject', value: `[Chatbot] Support Request from ${userData.name}` }
            ];
            
            fields.forEach(field => {
                const input = document.createElement('input');
                input.type = 'hidden';
                input.name = field.name;
                input.value = field.value;
                tempForm.appendChild(input);
            });
            
            document.body.appendChild(tempForm);
            
            // Set a timeout in case iframe load never fires (fallback)
            let timeoutId = setTimeout(() => {
                cleanup();
                reject(new Error('Submission timeout'));
            }, 10000);
            
            // Listen to iframe load event to detect submission completion
            const onFrameLoad = () => {
                clearTimeout(timeoutId);
                cleanup();
                // FormSubmit returns a success page or JSON. Since we cannot read cross-origin content,
                // we assume success if the request was sent. However we treat as success
                // because the email will be delivered. In case of network error, form submission still works.
                resolve(true);
            };
            
            hiddenFrame.addEventListener('load', onFrameLoad);
            
            function cleanup() {
                hiddenFrame.removeEventListener('load', onFrameLoad);
                if (tempForm && tempForm.parentNode) tempForm.parentNode.removeChild(tempForm);
            }
            
            // Submit the form
            tempForm.submit();
        });
    }
    
    // Reset everything fully
    function fullReset() {
        // reset state
        currentStep = 'init';
        userData = { name: '', email: '', topic: '', message: '' };
        // clear all messages
        messagesContainer.innerHTML = '';
        removeTempInteractiveElements();
        // clear any pending typing indicators
        const typingInd = document.getElementById('typingIndicator');
        if (typingInd) typingInd.remove();
        // re-enable input
        userInput.disabled = false;
        userInput.placeholder = "Type your answer...";
        userInput.value = '';
        // Start fresh conversation
        startConversation();
    }
    
    // The main conversation flow
    async function startConversation() {
        addMessage('bot', '👋 Hey there! I\'m your support assistant. I\'ll help you send feedback or request help — just like the contact form. Let\'s get started!');
        await showTyping(500);
        askName();
    }
    
    function askName() {
        currentStep = 'name';
        addMessage('bot', 'What\'s your name?');
    }
    
    function askEmail() {
        currentStep = 'email';
        addMessage('bot', 'Great! What\'s your email address? (So we can reply)');
    }
    
    function askTopic() {
        currentStep = 'topic';
        addMessage('bot', 'How can we help you? Select a topic:');
        addQuickReplyButtons([
            { label: '🆘 Need Help', value: 'Need Help' },
            { label: '🐞 Bug Report', value: 'Bug Report' },
            { label: '✨ Feature Request', value: 'Feature Request' },
            { label: '💬 General Feedback', value: 'Feedback' }
        ], (selectedTopic) => {
            userData.topic = selectedTopic;
            addMessage('user', selectedTopic);
            askMessage();
        });
    }
    
    function askMessage() {
        currentStep = 'message';
        addMessage('bot', 'Please describe your issue or feedback in detail. Tell us anything we should know:');
    }
    
    function showConfirmation() {
        currentStep = 'confirm';
        const summary = `
            <strong>📋 Please review:</strong><br>
            • Name: ${escapeHtml(userData.name)}<br>
            • Email: ${escapeHtml(userData.email)}<br>
            • Topic: ${escapeHtml(userData.topic)}<br>
            • Message: ${escapeHtml(userData.message.substring(0, 180))}${userData.message.length > 180 ? '…' : ''}<br>
            <em>Ready to send?</em>
        `;
        addMessage('bot', summary, true);
        addConfirmActions(() => submitFeedback(), () => {
            addMessage('bot', '🔄 Restarting from scratch — no worries, let\'s do it fresh!');
            fullReset();
        });
    }
    
    // Main submit handler
    async function submitFeedback() {
        // Show sending status
        addMessage('bot', '⏳ Sending your message, one moment...');
        
        try {
            // Use hidden iframe method (reliable, no CORS)
            await submitFeedbackViaIframe();
            // Success: show thank you message
            addMessage('bot', '✅ **Message sent!** 🎉 Thank you for reaching out. Our team will get back to you shortly.', true);
            addMessage('bot', '💡 Need anything else? Hit the "Restart" button to start a new conversation.');
            currentStep = 'finished';
            userInput.placeholder = "Chat completed — press Restart to begin";
            removeTempInteractiveElements();
        } catch (error) {
            console.error("Submit error:", error);
            addMessage('bot', '❌ Oops! Something went wrong while sending. Please check your internet connection or try again later. You can also restart the chat.', true);
            // allow user to retry by showing confirm buttons again? We'll keep step at confirm but remove old actions.
            removeTempInteractiveElements();
            // Re-add confirm actions so they can retry
            if (currentStep === 'confirm') {
                addConfirmActions(() => submitFeedback(), () => {
                    addMessage('bot', '🔄 Restarting from scratch — no worries, let\'s do it fresh!');
                    fullReset();
                });
            }
        }
    }
    
    // Helper: sanitize HTML
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // Process user typed message (from input field)
    async function processUserText(rawText) {
        const text = rawText.trim();
        if (text === "") {
            addMessage('bot', 'Please write something — I’m here to help 😊');
            return;
        }
        
        // If conversation finished, block further text and hint reset
        if (currentStep === 'finished') {
            addMessage('bot', '🔄 This conversation is completed. Press "Restart" to send another request.');
            userInput.value = '';
            return;
        }
        
        // Add user message to chat
        addMessage('user', text);
        userInput.value = '';
        
        // remove any lingering quick-reply/action UI
        removeTempInteractiveElements();
        
        // Process based on current step
        switch (currentStep) {
            case 'name':
                if (text.length < 2) {
                    addMessage('bot', 'Please enter a valid name (at least 2 characters).');
                } else {
                    userData.name = text;
                    askEmail();
                }
                break;
            case 'email':
                const emailRegex = /^[^\s@]+@([^\s@]+\.)+[^\s@]+$/;
                if (!emailRegex.test(text)) {
                    addMessage('bot', 'Hmm, that doesn\'t look like a valid email. Please enter a correct email (e.g., name@example.com).');
                } else {
                    userData.email = text;
                    askTopic();
                }
                break;
            case 'topic': {
                // Map typed text to one of the predefined topics
                const lowerInput = text.toLowerCase();
                let mappedTopic = null;
                if (lowerInput.includes('help') || lowerInput.includes('support') || lowerInput === 'need help') mappedTopic = 'Need Help';
                else if (lowerInput.includes('bug') || lowerInput.includes('error') || lowerInput.includes('crash')) mappedTopic = 'Bug Report';
                else if (lowerInput.includes('feature') || lowerInput.includes('request') || lowerInput.includes('suggestion')) mappedTopic = 'Feature Request';
                else if (lowerInput.includes('feedback') || lowerInput.includes('comment') || lowerInput.includes('general')) mappedTopic = 'Feedback';
                
                if (mappedTopic) {
                    userData.topic = mappedTopic;
                    addMessage('bot', `Selected topic: ${mappedTopic}`);
                    askMessage();
                } else {
                    addMessage('bot', 'Please select a topic using the buttons above, or type one of: "Help", "Bug Report", "Feature Request", "Feedback".');
                    // re-show quick replies to make it easier
                    askTopic();  // re-triggers topic step with buttons again
                }
                break;
            }
            case 'message':
                if (text.length < 5) {
                    addMessage('bot', 'Please provide a bit more detail (at least 5 characters). How can we assist you?');
                } else {
                    userData.message = text;
                    await showTyping(500);
                    showConfirmation();
                }
                break;
            default:
                if (currentStep === 'confirm') {
                    addMessage('bot', 'Please use the "Send Feedback" or "Edit / Start over" buttons above.');
                } else {
                    addMessage('bot', 'I’m not sure what happened. Press "Restart" to start over.');
                }
                break;
        }
    }
    
    // Event handlers
    function handleSend() {
        const rawMessage = userInput.value;
        if (rawMessage.trim() === "") return;
        processUserText(rawMessage);
    }
    
    sendBtn.addEventListener('click', handleSend);
    userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            handleSend();
        }
    });
    
    resetBtn.addEventListener('click', () => {
        fullReset();
    });
    
    // Initial start
    startConversation();
    
    // Focus input for better UX
    userInput.focus();
</script>
</body>
</html>
